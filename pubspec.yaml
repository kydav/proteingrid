name: proteingrid
description: "Quick-action protein tracking app"
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  cupertino_icons: ^1.0.8
  flutter:
    sdk: flutter
  flutter_local_notifications: ^18.0.1
  flutter_riverpod: ^2.5.1
  google_fonts: ^6.2.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  intl: ^0.20.2
  purchases_flutter: ^8.0.0
  quick_actions: ^1.0.7
  share_plus: ^10.1.4
  shared_preferences: ^2.3.3
  timezone: ^0.9.4
  uuid: ^4.5.1

dev_dependencies:
  flutter_launcher_icons: ^0.14.3
  flutter_lints: ^6.0.0
  flutter_native_splash: ^2.4.3
  flutter_test:
    sdk: flutter
  mocktail: ^1.0.4

flutter_native_splash:
  color: "#000000"
  image: ios/Runner/Assets.xcassets/AppIcon.appiconset/AppIcon.png
  color_dark: "#000000"
  image_dark: ios/Runner/Assets.xcassets/AppIcon.appiconset/AppIcon.png
  android_12:
    color: "#000000"
    image: ios/Runner/Assets.xcassets/AppIcon.appiconset/AppIcon.png
    color_dark: "#000000"
    image_dark: ios/Runner/Assets.xcassets/AppIcon.appiconset/AppIcon.png
  web: false

flutter_launcher_icons:
  android: true
  ios: false
  image_path_android: "ios/Runner/Assets.xcassets/AppIcon.appiconset/AppIcon.png"
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "ios/Runner/Assets.xcassets/AppIcon.appiconset/AppIcon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
