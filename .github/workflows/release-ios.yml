name: Release iOS

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      skip_upload:
        type: boolean
        description: Build only, skip TestFlight upload
        default: false

jobs:
  build-and-upload:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26"

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.0"
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Import distribution certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
        run: |
          CERT_PATH=$RUNNER_TEMP/distribution.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          echo -n "$CERTIFICATE_BASE64" | base64 --decode -o "$CERT_PATH"

          security create-keychain -p "" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k "" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

      - name: Install provisioning profiles
        env:
          PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
          WATCH_PROFILE_BASE64: ${{ secrets.IOS_WATCH_PROVISIONING_PROFILE_BASE64 }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo -n "$PROFILE_BASE64" | base64 --decode -o ~/Library/MobileDevice/Provisioning\ Profiles/runner.mobileprovision
          echo -n "$WATCH_PROFILE_BASE64" | base64 --decode -o ~/Library/MobileDevice/Provisioning\ Profiles/watch.mobileprovision

      - name: Build Archive
        run: |
          BUILD_NAME=$(grep '^version:' pubspec.yaml | sed 's/version: *//' | sed 's/+.*//' | tr -d ' ')
          flutter build ios --release \
            --build-number=${{ github.run_number }} \
            --build-name=$BUILD_NAME
          xcodebuild archive \
            -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -archivePath build/ios/archive/Runner.xcarchive \
            -destination "generic/platform=iOS" \
            DEVELOPMENT_TEAM=GMAMAXJ88G \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            CURRENT_PROJECT_VERSION=${{ github.run_number }} \
            MARKETING_VERSION=$BUILD_NAME

      - name: Package IPA
        run: |
          mkdir -p build/ios/ipa/Payload
          cp -r "build/ios/archive/Runner.xcarchive/Products/Applications/Runner.app" \
            build/ios/ipa/Payload/

          # SwiftSupport/ must use Apple's original-signed dylibs from the Xcode
          # toolchain — NOT the re-signed copies in Runner.app/Frameworks (ITMS-90433).
          mkdir -p build/ios/ipa/SwiftSupport/iphoneos
          SWIFT_DIR="$(xcode-select -p)/Toolchains/XcodeDefault.xctoolchain/usr/lib/swift/iphoneos"
          for dylib in build/ios/ipa/Payload/Runner.app/Frameworks/libswift*.dylib; do
            name=$(basename "$dylib")
            [ -f "$SWIFT_DIR/$name" ] && cp "$SWIFT_DIR/$name" build/ios/ipa/SwiftSupport/iphoneos/
          done
          echo "SwiftSupport: $(ls build/ios/ipa/SwiftSupport/iphoneos/ | wc -l) dylibs"

          cd build/ios/ipa && zip -r Runner.ipa Payload SwiftSupport && rm -rf Payload SwiftSupport
          echo "IPA packaged: $(ls -lh Runner.ipa)"

      - name: Upload to TestFlight
        if: ${{ !inputs.skip_upload }}
        env:
          KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo -n "$KEY_BASE64" | base64 --decode -o ~/.appstoreconnect/private_keys/AuthKey_${KEY_ID}.p8

          IPA_PATH=$(find build -name '*.ipa' | head -1)
          echo "IPA found at: $IPA_PATH"
          if [ -z "$IPA_PATH" ]; then echo "ERROR: no IPA found"; find build -type f | head -30; exit 1; fi

          xcrun altool --upload-app \
            --type ios \
            --file "$IPA_PATH" \
            --apiKey "$KEY_ID" \
            --apiIssuer "$ISSUER_ID"

      - name: Remove signing keychain
        if: always()
        run: security delete-keychain $RUNNER_TEMP/app-signing.keychain-db || true
